<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, "Segoe UI", sans-serif;
        width: 300px;
        padding: 14px;
        margin: 0;
        color: #1a1a1a;
      }
      h1 { font-size: 15px; margin: 0 0 4px; }
      p { font-size: 12px; color: #666; margin: 0 0 10px; line-height: 1.4; }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        font-size: 13px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-family: ui-monospace, monospace;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 8px;
        font-size: 13px;
        background: #D97757;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { background: #c96646; }
      #status { font-size: 12px; margin-top: 8px; min-height: 16px; }
      .ok { color: #178a3a; }
      .err { color: #c0392b; }
    </style>
  </head>
  <body>
    <h1>Claude Notifications</h1>
    <p>
      Paste the token printed by
      <code>claude-notifications install-browser-listener</code>, then Save.
    </p>
    <input id="token" type="text" placeholder="paste token here" autocomplete="off" />
    <button id="save">Save &amp; test</button>
    <button id="testbanner" style="background:#555">Test banner</button>
    <div id="status"></div>
    <div id="diag" style="font-size:11px;color:#888;margin-top:6px;min-height:14px;"></div>
    <script src="popup.js"></script>
  </body>
</html>
